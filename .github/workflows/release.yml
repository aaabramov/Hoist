name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make all

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "AutoRaise" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AutoRaise.app" 150 190 \
            --app-drop-link 450 190 \
            AutoRaise.dmg \
            AutoRaise.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoRaise.dmg
          generate_release_notes: true
